name: Build and Deploy Frontend

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  S3_BUCKET: trustedge-frontend
  CLOUDFRONT_DISTRIBUTION_ID: E26UGOT5YUPFRY
  # HTTPS API origin (required when UI is served from CloudFront — browsers block http/ws mixed content)
  BACKEND_API_URL: https://daemixzdg8jfd.cloudfront.net

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Verify build secrets
        run: |
          if [ -z "${{ secrets.ADMIN_API_TOKEN }}" ]; then
            echo "::error::GitHub secret ADMIN_API_TOKEN is not set (must match /etc/trustedge/backend.env on EC2)."
            exit 1
          fi

      - name: Build React app
        working-directory: ./frontend
        env:
          REACT_APP_API_BASE_URL: ${{ env.BACKEND_API_URL }}
          REACT_APP_ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build

      # Pinned SHAs avoid flaky codeload resolution for @v4 floating tags.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure S3 bucket exists
        env:
          FRONTEND_S3_BUCKET: ${{ env.S3_BUCKET }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: bash aws/ensure-frontend-bucket.sh

      - name: Upload to S3
        run: |
          aws s3 sync frontend/build s3://${{ env.S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "Frontend deployed successfully!"
          echo "CloudFront URL: https://d2qp7beltc09b8.cloudfront.net"
          echo "Backend API: ${{ env.BACKEND_API_URL }}"
