server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files /index.html =404;
    }
}

# Default HTTPS for blocked domains (DNS points to 10.0.0.1). Browsers show a cert
# warning because the cert is for "NetGarde Block Page", not facebook.com, etc.
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/block-page.crt;
    ssl_certificate_key /etc/nginx/ssl/block-page.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files /index.html =404;
    }
}
