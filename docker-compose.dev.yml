version: '3.8'

services:
  block-page:
    build:
      context: ./block-page
      dockerfile: Dockerfile
    container_name: trustedge-block-page-dev
    ports:
      - "8081:80"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: trustedge-redis-dev
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: trustedge-api-dev
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.development
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-12345}
      - POSTGRES_DB=${POSTGRES_DB:-trustedge}
      - DB_URL=${DB_URL:-postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-12345}@db:5432/${POSTGRES_DB:-trustedge}}
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - USAGE_REDIS_ENABLED=${USAGE_REDIS_ENABLED:-true}
      - USAGE_HISTORY_MINUTES=${USAGE_HISTORY_MINUTES:-60}
      - USAGE_PERSIST_SAMPLES=${USAGE_PERSIST_SAMPLES:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - /app/.pytest_cache
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: trustedge-frontend-dev
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - FAST_REFRESH=true
      - WDS_SOCKET_HOST=localhost
      - WDS_SOCKET_PORT=3000
      - REACT_APP_API_BASE_URL=http://localhost:8000
    stdin_open: true
    tty: true
    command: npm start
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: trustedge-db-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-12345}
      POSTGRES_DB: ${POSTGRES_DB:-trustedge}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-trustedge}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  dns-sync:
    build:
      context: ./dns-sync
      dockerfile: Dockerfile
    container_name: trustedge-dns-sync-dev
    volumes:
      # Use local directory for dev instead of system dnsmasq.d
      - ./dns-sync/output:/etc/dnsmasq.d:rw
    environment:
      - API_BASE_URL=${API_BASE_URL:-http://backend:8000}
      - POLICY_DNS_SYNC_ENDPOINT=${POLICY_DNS_SYNC_ENDPOINT:-/policy/dns-sync}
      - DEVICE_SYNC_ENDPOINT=${DEVICE_SYNC_ENDPOINT:-/devices/sync-dhcp}
      - DHCP_LEASES_PATH=${DHCP_LEASES_PATH:-/var/lib/misc/dnsmasq.leases}
      - DEVICE_SYNC_ENABLED=${DEVICE_SYNC_ENABLED:-1}
      - BLOCK_IP=${BLOCK_IP:-${BLOCK_PAGE_IP:-10.0.0.1}}
      - BLOCK_PAGE_IP=${BLOCK_PAGE_IP:-10.0.0.1}
      - BLOCK_IPV6_IP=${BLOCK_IPV6_IP:-::}
      - DNS_CONFIG_PATH=${DNS_CONFIG_PATH:-/etc/dnsmasq.d/blocked-domains.conf}
      - SYNC_INTERVAL=${SYNC_INTERVAL:-0}  # Run once and exit (for manual testing)
      - DNSMASQ_RESTART_CMD=${DNSMASQ_RESTART_CMD:-}  # Empty for dev
    depends_on:
      - backend
      - block-page
    # No restart policy - run manually when needed

volumes:
  pgdata:
