services:
  block-page:
    build:
      context: ./block-page
      dockerfile: Dockerfile
    container_name: netgarde-block-page
    ports:
      - "80:80"
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: netgarde-api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.production
    environment:
      PYTHONUNBUFFERED: "1"
      LOG_TO_FILE: "0"  # Disable file logging in production (logs go to stdout/stderr)
      # VPN enroll settings (required for POST /v1/enroll)
      VPN_ENDPOINT: ${VPN_ENDPOINT:-44.218.45.174:51820}
      VPN_SERVER_PUBLIC_KEY: ${VPN_SERVER_PUBLIC_KEY:-ooeDpLVJvX8OaNz13CPNAuZXFMMzMx3nV7Kvg0LPy1c=}
      # Host WireGuard agent (must match systemd service on EC2)
      WG_AGENT_URL: ${WG_AGENT_URL:-http://172.17.0.1:9109}
      WG_AGENT_TOKEN: ${WG_AGENT_TOKEN}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    volumes:
      - ./backend:/app
    command: >
      bash -c "
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'
      "

  dns-sync:
    build:
      context: ./dns-sync
      dockerfile: Dockerfile
    # Note: For cron mode, set SYNC_INTERVAL=0 and use 'docker compose run --rm dns-sync'
    # For continuous mode, keep restart: unless-stopped and SYNC_INTERVAL > 0
    volumes:
      - /etc/dnsmasq.d:/etc/dnsmasq.d:rw
      - /var/lib/misc:/var/lib/misc:ro
    environment:
      - API_BASE_URL=${API_BASE_URL:-http://backend:8000}
      - API_ENDPOINT=${API_ENDPOINT:-/blocked-sites}
      - DEVICE_SYNC_ENDPOINT=${DEVICE_SYNC_ENDPOINT:-/devices/sync-dhcp}
      - DHCP_LEASES_PATH=${DHCP_LEASES_PATH:-/var/lib/misc/dnsmasq.leases}
      - DEVICE_SYNC_ENABLED=${DEVICE_SYNC_ENABLED:-1}
      - BLOCK_IP=${BLOCK_IP:-${BLOCK_PAGE_IP:-0.0.0.0}}
      - DNS_CONFIG_PATH=${DNS_CONFIG_PATH:-/etc/dnsmasq.d/blocked-domains.conf}
      - SYNC_INTERVAL=${SYNC_INTERVAL:-0}
      - PAGE_SIZE=${PAGE_SIZE:-100}
      - DNSMASQ_RESTART_CMD=${DNSMASQ_RESTART_CMD:-killall -HUP dnsmasq}
    depends_on:
      backend:
        condition: service_healthy  # Wait for backend to be healthy before starting
      block-page:
        condition: service_started
    # No restart policy for cron mode - container runs once and exits

