services:
  # Optional local LLM (~3GB+ image + model). Enable with: COMPOSE_PROFILES=ai docker compose up -d
  # See scripts/ec2-setup-ollama.sh
  ollama:
    profiles: ["ai"]
    image: ollama/ollama:latest
    container_name: netgarde-ollama
    ports:
      # Reachable from backend via host.docker.internal when compose DNS name is unavailable
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: always

  redis:
    image: redis:7-alpine
    container_name: netgarde-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  block-page:
    build:
      context: ./block-page
      dockerfile: Dockerfile
    container_name: netgarde-block-page
    # Published on all host interfaces (includes wg0 / 10.0.0.1 for VPN clients)
    ports:
      - "${BLOCK_PAGE_HOST_BIND:-0.0.0.0}:80:80"
      - "${BLOCK_PAGE_HOST_BIND:-0.0.0.0}:443:443"
    volumes:
      # Host-generated by scripts/block-page-tls/generate-certs.sh (SANs = blocked domains)
      - ${BLOCK_PAGE_TLS_DIR:-/etc/netgarde/block-page-tls}:/etc/nginx/ssl:ro
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: netgarde-api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    # Production secrets live on the EC2 host (survives CI/CD); see scripts/ec2-sync-backend-env.sh
    env_file:
      - /etc/netgarde/backend.env
    environment:
      PYTHONUNBUFFERED: "1"
      LOG_TO_FILE: "0"  # Disable file logging in production (logs go to stdout/stderr)
      LOG_JSON: "1"
      LOG_LEVEL: "INFO"
      LOG_SERVICE: "backend"
      # VPN enroll settings (required for POST /v1/enroll)
      VPN_ENDPOINT: ${VPN_ENDPOINT:-44.218.45.174:51820}
      VPN_SERVER_PUBLIC_KEY: ${VPN_SERVER_PUBLIC_KEY:-ooeDpLVJvX8OaNz13CPNAuZXFMMzMx3nV7Kvg0LPy1c=}
      # Host WireGuard agent (must match systemd service on EC2)
      WG_AGENT_URL: ${WG_AGENT_URL:-http://172.17.0.1:9109}
      # Required: set WG_AGENT_TOKEN in repo-root `.env` (see `.env.production.example`) or export it in your shell.
      WG_AGENT_TOKEN: ${WG_AGENT_TOKEN:?WG_AGENT_TOKEN is required (set in .env or environment)}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      USAGE_REDIS_ENABLED: ${USAGE_REDIS_ENABLED:-true}
      USAGE_HISTORY_MINUTES: ${USAGE_HISTORY_MINUTES:-60}
      USAGE_PERSIST_SAMPLES: ${USAGE_PERSIST_SAMPLES:-false}
      POLICY_PACK_SNAPSHOT_DIR: /var/lib/netgarde/policy-snapshots
      # AI review settings: use /etc/netgarde/backend.env only (compose env would override env_file)
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    volumes:
      - ./backend:/app
      - policy-pack-snapshots:/var/lib/netgarde/policy-snapshots
    command: >
      bash -c "
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'
      "

  dns-sync:
    build:
      context: ./dns-sync
      dockerfile: Dockerfile
    container_name: netgarde-dns-sync
    # Note: For cron mode, set SYNC_INTERVAL=0 and use 'docker compose run --rm dns-sync'
    # For continuous mode, keep restart: unless-stopped and SYNC_INTERVAL > 0
    volumes:
      - /etc/dnsmasq.d:/etc/dnsmasq.d:rw
      - /var/lib/misc:/var/lib/misc:ro
    environment:
      - LOG_JSON=1
      - LOG_LEVEL=INFO
      - API_BASE_URL=${API_BASE_URL:-http://backend:8000}
      # Match /etc/netgarde/backend.env (export before compose up, or set in repo-root .env)
      - DNS_INGEST_TOKEN=${DNS_INGEST_TOKEN:-}
      - ADMIN_API_TOKEN=${ADMIN_API_TOKEN:-}
      - API_ENDPOINT=${API_ENDPOINT:-/blocked-sites}
      - DEVICE_SYNC_ENDPOINT=${DEVICE_SYNC_ENDPOINT:-/devices/sync-dhcp}
      - DHCP_LEASES_PATH=${DHCP_LEASES_PATH:-/var/lib/misc/dnsmasq.leases}
      - DEVICE_SYNC_ENABLED=${DEVICE_SYNC_ENABLED:-1}
      - BLOCK_IP=${BLOCK_IP:-${BLOCK_PAGE_IP:-10.0.0.1}}
      - BLOCK_PAGE_IP=${BLOCK_PAGE_IP:-10.0.0.1}
      - BLOCK_IPV6_IP=${BLOCK_IPV6_IP:-::}
      - DNS_CONFIG_PATH=${DNS_CONFIG_PATH:-/etc/dnsmasq.d/blocked-domains.conf}
      - SYNC_INTERVAL=${SYNC_INTERVAL:-0}
      - PAGE_SIZE=${PAGE_SIZE:-100}
      - DNSMASQ_RESTART_CMD=${DNSMASQ_RESTART_CMD:-killall -HUP dnsmasq}
    depends_on:
      backend:
        condition: service_healthy  # Wait for backend to be healthy before starting
      block-page:
        condition: service_started
    # No restart policy for cron mode - container runs once and exits

volumes:
  ollama-data:
  policy-pack-snapshots:

